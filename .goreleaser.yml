#
# GoReleaser config for EagleEye.
#
# Kept for local snapshot builds and a possible future CI migration.
# The actual release pipeline runs through GitHub Actions
# (.github/workflows/release.yml), because Fyne requires CGO and native
# OS windowing libraries, so release builds are currently done on native runners.
#
#

version: 2
project_name: eagleeye

before:
  hooks:
    - go mod tidy

builds:
  - id: eagleeye-linux
    main: ./cmd
    binary: eagleeye
    env:
      - CGO_ENABLED=1
    goos: [ linux ]
    goarch: [ amd64 ]
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: eagleeye-windows
    main: ./cmd
    binary: EagleEye
    env:
      - CGO_ENABLED=1
    goos: [ windows ]
    goarch: [ amd64 ]
    flags:
      - -trimpath
      - -buildvcs=false
    ldflags:
      - -s -w
      - -H=windowsgui
    # Icon embedding is handled by build_with_icon.ps1 in the Actions workflow.
    #For goreleaser native icon embedding, pre-generate a .syso via rsrc here!


  - id: eagleeye-darwin
    main: ./cmd
    binary: EagleEye
    env:
      - CGO_ENABLED=1
    goos: [ darwin ]
    goarch: [ amd64, arm64 ]
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    ids:
      - eagleeye-linux
      - eagleeye-windows
      - eagleeye-darwin
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "Merge pull request"

release:
  draft: false
  prerelease: auto
  name_template: "{{ .Tag }}"
